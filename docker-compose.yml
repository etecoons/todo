services:
  rustdo:
    build: .
    image: ubermetroid/rustdo:latest
    container_name: rustdo
    restart: unless-stopped
    ports:
      - ${PORT:-4403}:4403
    volumes:
      - ${RUSTDO_DATA_PATH:-./data}:/app/data
    environment:
      PORT: 4403
      SITE_TITLE: ${RUSTDO_SITE_TITLE:-RustDo}
      RUSTDO_PIN: ${RUSTDO_PIN:-}
      BASE_URL: ${BASE_URL:-http://localhost:4403}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      TZ: ${TZ:-UTC}
      SINGLE_LIST: ${SINGLE_LIST:-false}
      ENABLE_TRANSLATION: ${ENABLE_TRANSLATION:-false}
      MAX_ATTEMPTS: ${MAX_ATTEMPTS:-5}

