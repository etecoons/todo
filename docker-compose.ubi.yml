# Pilot: run Todo on a UBI-minimal image (local build, not Docker Hub).
#
#   podman compose -f docker-compose.ubi.yml up --build
#   # or:
#   podman build -f Containerfile.ubi -t todo-ubi:latest .
#   podman compose -f docker-compose.ubi.yml up

services:
  todo:
    build:
      context: .
      dockerfile: Containerfile.ubi
    image: todo-ubi:latest
    container_name: todo-ubi
    restart: unless-stopped
    ports:
      - "${PORT:-4403}:4403"
    volumes:
      - ${TODO_DATA_PATH:-./data}:/app/data:Z
    environment:
      PORT: 4403
      SITE_TITLE: ${TODO_SITE_TITLE:-Todo (UBI)}
      TODO_PIN: ${TODO_PIN:-}
      BASE_URL: ${TODO_BASE_URL:-http://localhost:4403}
      ALLOWED_ORIGINS: ${TODO_ALLOWED_ORIGINS:-*}
      TZ: ${TZ:-UTC}
      SINGLE_LIST: ${SINGLE_LIST:-false}
      ENABLE_TRANSLATION: ${ENABLE_TRANSLATION:-false}
      ENABLE_THEMES: ${ENABLE_THEMES:-true}
      ENABLE_PRINT: ${ENABLE_PRINT:-true}
      MAX_ATTEMPTS: ${MAX_ATTEMPTS:-5}
